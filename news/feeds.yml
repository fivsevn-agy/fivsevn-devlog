site:
  title: "Daily News Radar"
  subtitle: "A lightweight daily reading surface for devlog.fivsevn.com/news."
  max_items_per_section: 20

sections:
  science:
    title: "Science"
    description: "Research, science news, space, nature, and applied science."
    feeds:
      - name: "Nature"
        url: "https://www.nature.com/nature.rss"
      - name: "Science"
        url: "https://www.science.org/rss/news_current.xml"
      - name: "Phys.org"
        url: "https://phys.org/rss-feed/"
      - name: "ScienceDaily"
        url: "https://www.sciencedaily.com/rss/all.xml"
      - name: "Live Science"
        url: "https://www.livescience.com/feeds/all"

  technology_ai:
    title: "Technology / AI"
    description: "Technology, AI, computing, software, and digital infrastructure."
    feeds:
      - name: "Hacker News"
        url: "https://hnrss.org/frontpage"
      - name: "MIT Technology Review"
        url: "https://www.technologyreview.com/feed/"
      - name: "Ars Technica"
        url: "https://feeds.arstechnica.com/arstechnica/index"
      - name: "The Verge"
        url: "https://www.theverge.com/rss/index.xml"

  world:
    title: "World"
    description: "General world news and international affairs."
    feeds:
      - name: "BBC World"
        url: "https://feeds.bbci.co.uk/news/world/rss.xml"
      - name: "The Guardian World"
        url: "https://www.theguardian.com/world/rss"
      - name: "NPR News"
        url: "https://feeds.npr.org/1001/rss.xml"

  china_asia:
    title: "China / Asia"
    description: "China, East Asia, and regional current affairs."
    feeds:
      - name: "联合早报"
        url: "https://www.zaobao.com.sg/realtime/rss.xml"

  long_reads:
    title: "Long Reads"
    description: "Essays, features, analysis, and slower reading."
    feeds:
      - name: "Aeon"
        url: "https://aeon.co/feed.rss"
      - name: "Nautilus"
        url: "https://nautil.us/feed/"
