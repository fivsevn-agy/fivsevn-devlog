name: Build Intake Page

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"

permissions:
  contents: write

concurrency:
  group: build-intake
  cancel-in-progress: false

jobs:
  build-intake:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r intake/requirements.txt

      - name: Update daily image
        run: python intake/scripts/daily_postcard.py

      - name: Update daily species
        run: python intake/scripts/daily_field_sample.py

      - name: Update intake page
        run: python intake/build.py

      - name: Rename LLM context file
        run: |
          test -f intake/gpt.md
          mv intake/gpt.md intake/llm-context.md
          test -f intake/llm-context.md
          wc -c intake/llm-context.md

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git rm -r --cached intake/data || true
          git rm --cached intake/gpt.md || true

          git add intake/index.html
          git add intake/llm-context.md

          git status --short

          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore(intake): update generated intake page and llm context"
            git push
          fi