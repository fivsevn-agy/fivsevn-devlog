name: Build AI Data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */5 * * *"

permissions:
  contents: write

concurrency:
  group: build-ai-data-main
  cancel-in-progress: true

jobs:
  build-ai-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync latest main
        run: |
          git fetch origin main
          git checkout main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build AI-readable news data
        run: python ai/build_news.py

      - name: Commit and push AI data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add ai/news.json ai/news.md ai/latest-items.json

          if git diff --cached --quiet; then
            echo "No AI data changes to commit."
            exit 0
          fi

          git commit -m "chore(ai): update AI-readable data"

          git fetch origin main
          git pull --rebase origin main
          git push origin HEAD:main