name: Build AI Data

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */5 * * *"

permissions:
  contents: write

concurrency:
  group: build-ai-data
  cancel-in-progress: false

jobs:
  build-ai-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build AI-readable news data
        run: python ai/build_news.py

      - name: Save AI data files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(ai): update AI-readable data"
          file_pattern: |
            ai/news.json
            ai/news.md
            ai/latest-items.json
