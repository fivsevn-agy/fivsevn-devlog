    feeds:
      - name: "BBC World"
        url: "https://feeds.bbci.co.uk/news/world/rss.xml"
      - name: "The Guardian World"
        url: "https://www.theguardian.com/world/rss"
      - name: "NPR News"
        url: "https://feeds.npr.org/1001/rss.xml"

  ideas:
    title: "ideas"
    title_zh: "思想"
    description: "Philosophy, essays, intellectual history, and reflective long-form reading."
    description_zh: "哲学、随笔、思想史与反思性长文。"
    feeds:
      - name: "Aeon"
        url: "https://aeon.co/feed.rss"
